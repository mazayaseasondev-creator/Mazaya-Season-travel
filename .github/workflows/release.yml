# Manually-triggered release workflow: creates a git tag + GitHub Release
# on the chosen branch (Actions tab -> Release -> Run workflow).
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. V1.03)"
        required: true
      title:
        description: "Release title (defaults to the tag name)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "${TITLE:-$TAG}" \
            --generate-notes
