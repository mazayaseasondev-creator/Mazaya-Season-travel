<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mazaya Admin Dashboard</title><meta name="robots" content="noindex"><link rel="stylesheet" href="../css/styles.css"></head><body>
<div class="admin-layout">
  <aside class="sidebar">
    <h2>Mazaya Admin</h2>
    <a class="active" href="#dashboard">Dashboard</a>
    <a href="#visas">Visa requests</a>
    <a href="#hotels">Hotels</a>
    <a href="#flights">Flights</a>
    <a href="#tours">Tours</a>
    <a href="#customers">Customers</a>
    <a href="#payments">Payments</a>
    <a href="#leads">Leads</a>
  </aside>
  <main class="admin-main">
    <h1>Operations dashboard</h1>
    <div id="admin-auth-note"></div>
    <div id="admin-stats" class="stats"><div class="stat"><span>Loading…</span></div></div>

    <section class="section" id="visas"><div class="card pad"><h2>Visa requests</h2><div id="admin-visa-queue">Loading…</div></div></section>
    <section class="section" id="hotels"><div class="card pad"><h2>Hotel bookings</h2><div id="admin-hotel-bookings">Loading…</div></div></section>
    <section class="section" id="flights"><div class="card pad"><h2>Flight bookings</h2><div id="admin-flight-bookings">Loading…</div></div></section>
    <section class="section" id="tours"><div class="card pad"><h2>Tour bookings</h2><div id="admin-tour-bookings">Loading…</div></div></section>
    <section class="section" id="customers"><div class="card pad"><h2>Customers</h2><div id="admin-customers">Loading…</div></div></section>
    <section class="section" id="payments"><div class="card pad"><h2>Payments &amp; refunds</h2><div id="admin-payments">Loading…</div></div></section>
    <section class="section" id="leads"><div class="card pad"><h2>Leads</h2><div id="admin-leads">Loading…</div></div></section>
  </main>
</div>
<script src="../js/app.js"></script>
</body></html>
