<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link rel="stylesheet" href="../css/styles.css"></head><body><div id="site-header"></div>
<main><section class="section"><div class="container" style="max-width:520px"><div class="card pad"><h1>Login / Sign up</h1><div class="field"><label>Email or mobile</label><input id="login-id" placeholder="you@example.com"></div><br><button class="btn ghost" onclick="requestOtp()">Send code</button><div class="field" style="margin-top:14px"><label>OTP</label><input id="login-otp" inputmode="numeric" maxlength="6" placeholder="6 digit code"></div><br><button class="btn primary" onclick="verifyOtp()">Continue</button></div></div></section></main><div id="site-footer"></div><script src="../js/app.js"></script>
</body></html>
