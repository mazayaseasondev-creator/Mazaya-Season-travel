<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tours</title><link rel="stylesheet" href="../css/styles.css"></head><body><div id="site-header"></div>
<main><section class="section"><div class="container">
  <h1>Tours &amp; activities</h1>
  <p class="lead">Search experiences, pick transfer and guide options, and book with an instant voucher.</p>
  <div class="card pad">
    <div class="form-grid">
      <div class="field"><label>City</label><input id="t-city" value="Dubai" placeholder="e.g. Dubai"></div>
      <div class="field"><label>Date</label><input type="date" id="t-date"></div>
      <div class="field"><label>Travellers</label><input type="number" id="t-travellers" value="2" min="1" max="12"></div>
      <button class="btn primary" onclick="searchTours()">Search</button>
    </div>
  </div>
  <div id="tour-results" style="margin-top:18px"></div>
  <p style="color:#667;margin-top:10px"><a href="tour-bookings.html">My tour bookings →</a></p>
</div></section></main>
<div id="site-footer"></div><script src="../js/app.js"></script>
</body></html>
