<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hotels</title><link rel="stylesheet" href="../css/styles.css"></head><body><div id="site-header"></div>
<main><section class="section"><div class="container">
  <h1>Hotels</h1>
  <p class="lead">Search live availability, book a room and get an instant voucher.</p>
  <div class="card pad">
    <div class="form-grid">
      <div class="field"><label>City</label><input id="h-city" value="Dubai" placeholder="e.g. Dubai"></div>
      <div class="field"><label>Check-in</label><input type="date" id="h-checkin"></div>
      <div class="field"><label>Check-out</label><input type="date" id="h-checkout"></div>
      <div class="field"><label>Guests</label><input type="number" id="h-guests" value="2" min="1" max="6"></div>
      <button class="btn primary" onclick="searchHotels()">Search</button>
    </div>
  </div>
  <div id="hotel-results" style="margin-top:18px"></div>
  <p style="color:#667;margin-top:10px"><a href="hotel-bookings.html">My hotel bookings →</a></p>
</div></section></main>
<div id="site-footer"></div><script src="../js/app.js"></script>
</body></html>
