<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flights</title><link rel="stylesheet" href="../css/styles.css"></head><body><div id="site-header"></div>
<main><section class="section"><div class="container">
  <h1>Flights</h1>
  <p class="lead">Search fares, hold a seat and pay to ticket instantly.</p>
  <div class="card pad">
    <div class="form-grid">
      <div class="field"><label>From</label><input id="f-origin" value="AUH" placeholder="e.g. AUH"></div>
      <div class="field"><label>To</label><input id="f-destination" value="IST" placeholder="e.g. IST"></div>
      <div class="field"><label>Departure</label><input type="date" id="f-depart"></div>
      <div class="field"><label>Travellers</label><input type="number" id="f-adults" value="1" min="1" max="9"></div>
      <button class="btn primary" onclick="searchFlights()">Search</button>
    </div>
  </div>
  <div id="flight-results" style="margin-top:18px"></div>
  <p style="color:#667;margin-top:10px"><a href="flight-bookings.html">My flight bookings →</a></p>
</div></section></main>
<div id="site-footer"></div><script src="../js/app.js"></script>
</body></html>
